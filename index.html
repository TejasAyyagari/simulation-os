    <!-- Lock viewport exactly like a native app — no zoom, no resize -->

    <!-- iOS: run as full-screen app when added to home screen -->

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VORAX" />

    <!-- Android Chrome: same full-screen behaviour -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#080510" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
